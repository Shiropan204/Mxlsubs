name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build with Vite
        run: npm run build

      - name: Verify build output
        run: |
          echo "Repository root:"
          ls -la
          echo ""
          if [ -d dist ]; then
            echo "dist directory contents:"
            ls -la dist
            echo ""
            if [ -f dist/index.html ]; then
              echo "dist/index.html (first 50 lines):"
              head -n 50 dist/index.html
            else
              echo "ERROR: dist/index.html not found"
              exit 1
            fi
          else
            echo "ERROR: dist directory not found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages (with retries)
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry if Pages deployment failed
        if: steps.deployment.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Initial deploy failed — retrying once..."
          n=0
          until [ $n -ge 2 ]
          do
            gh api repos/${{ github.repository }}/pages/builds -X POST || true
            n=$((n+1))
            sleep 10
          done
          
          # Force job failure if the deployment step failed
          exit 1
